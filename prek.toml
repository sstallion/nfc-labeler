[[repos]]
repo = "builtin"
hooks = [
    { id = "trailing-whitespace", args = ["--markdown-linebreak-ext=md"] },
    { id = "mixed-line-ending" },
    { id = "end-of-file-fixer" },
    { id = "check-json" },
    { id = "check-yaml" },
    { id = "check-toml" },
]

[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.15.12"
hooks = [
    { id = "ruff-check", types_or = ["python", "pyproject"] },
    { id = "ruff-format" },
]
